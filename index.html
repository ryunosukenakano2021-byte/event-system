<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARTY TOKYO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<!-- ✅ 修正: 実績あるQRコードライブラリを使用 -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
:root{--gold:#C9A84C;--gold-light:#E8D08A;--gold-dim:#7a6230;--black:#080808;--white:#F5F0E8;--gray:#888880;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-logo{position:fixed;inset:0;pointer-events:none;z-index:0;display:flex;align-items:center;justify-content:center;}
.bg-logo img{width:80vmin;height:80vmin;object-fit:contain;opacity:0.18;filter:grayscale(100%);}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 70% 70% at 50% 50%,rgba(8,8,8,0.2) 0%,rgba(8,8,8,0.8) 60%,rgba(8,8,8,0.96) 100%);}
.wrap{position:relative;z-index:2;width:100%;max-width:480px;padding:56px 40px;}
.brand{font-family:'Noto Serif JP',serif;font-size:0.62rem;letter-spacing:0.5em;color:var(--gold);margin-bottom:6px;}
.ttl{font-family:'Noto Serif JP',serif;font-size:2.6rem;font-weight:300;line-height:1.15;color:var(--white);margin-bottom:4px;}
.ttl em{font-style:normal;color:var(--gold);}
.sub{font-size:0.68rem;letter-spacing:0.18em;color:var(--gray);margin-bottom:36px;}
.pbadge{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(201,168,76,0.3);padding:10px 20px;margin-bottom:32px;background:rgba(201,168,76,0.04);}
.pl{font-size:0.55rem;letter-spacing:0.25em;color:var(--gray);}
.ps{color:rgba(201,168,76,0.3);}
.pn{font-size:0.82rem;color:var(--gold);}
.fg{margin-bottom:28px;}
.fl{display:block;font-size:0.58rem;letter-spacing:0.22em;color:var(--gray);margin-bottom:10px;}
.fi{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:11px 0;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.3s;}
.fi::placeholder{color:rgba(255,255,255,0.2);}
.fi:focus{border-bottom-color:var(--gold);}
.gt{display:flex;margin-top:4px;}
.gb{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.12);padding:13px;color:var(--gray);font-family:'Noto Sans JP',sans-serif;font-size:0.72rem;cursor:pointer;transition:all 0.3s;text-align:center;}
.gb:first-child{border-right:none;}
.gb.on{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold);}
.sbtn{width:100%;margin-top:20px;background:var(--gold);border:none;cursor:pointer;padding:17px;color:var(--black);font-family:'Noto Sans JP',sans-serif;font-size:0.72rem;font-weight:500;letter-spacing:0.25em;transition:background 0.3s;}
.sbtn:hover{background:var(--gold-light);}
.sbtn:disabled{opacity:0.5;cursor:not-allowed;}
.eb{background:rgba(207,68,68,0.08);border:1px solid rgba(207,68,68,0.3);padding:13px 16px;font-size:0.7rem;color:#CF4444;margin-bottom:18px;display:none;}
.sv{display:none;text-align:center;padding:20px 0;}
.si{width:56px;height:56px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.4rem;}
.st{font-family:'Noto Serif JP',serif;font-size:1.8rem;color:var(--gold);margin-bottom:8px;}
.ss{font-size:0.72rem;color:var(--gray);line-height:1.9;margin-bottom:16px;}
.sn{padding:12px 16px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.35);color:var(--gold);font-size:0.72rem;margin-bottom:20px;}
/* ✅ 修正: QRラッパーのスタイルを調整（canvasに対応） */
#qr-wrap{background:#fff;padding:12px;display:inline-block;margin-bottom:8px;line-height:0;}
#qr-wrap canvas{display:block;}
.gidl{color:var(--gold-dim);font-size:0.62rem;letter-spacing:0.12em;margin-top:4px;}
.ld{text-align:center;padding:60px 0;color:var(--gray);font-size:0.72rem;}
.nf{display:none;text-align:center;padding:60px 0;}
</style>
</head>

  <div id="ld" class="ld">読み込み中…</div>
  <div id="nf" class="nf">
    <div style="font-family:'Noto Serif JP',serif;font-size:1.6rem;color:var(--gray);margin-bottom:12px;">招待リンクが無効です</div>
    <div style="font-size:0.7rem;color:var(--gray);">プロモーターから受け取ったリンクをご確認ください。</div>
  </div>
  <div id="fm" style="display:none">
    <div class="brand">LUXE PARTY TOKYO</div>
    <h1 class="ttl">特別な夜へ、<br><em>ようこそ</em></h1>
    <div class="sub">事前来場登録</div>
    <div class="pbadge"><span class="pl">招待者</span><span class="ps">|</span><span class="pn" id="pn">—</span></div>
    <div class="eb" id="eb"></div>
    <div class="fg"><label class="fl">お名前</label><input class="fi" id="nm" type="text" placeholder="山田 太郎" autocomplete="off"></div>
    <div class="fg"><label class="fl">メールアドレス</label><input class="fi" id="em" type="email" placeholder="your@email.com"></div>
    <div class="fg">
      <label class="fl">性別</label>
      <div class="gt">
        <div class="gb on" id="gm" onclick="sg('male')">男性</div>
        <div class="gb" id="gf" onclick="sg('female')">女性</div>
      </div>
    </div>
    <button class="sbtn" id="sb" onclick="reg()">登録する</button>
  </div>
  <div id="ok" class="sv">
    <div class="si">✦</div>
    <div class="st">登録完了</div>
    <p class="ss">ご登録ありがとうございます。<br>下記のQRコードを当日ご提示ください。</p>
    <div class="sn">📸 このQRコードをスクリーンショットして保存してください</div>
    <div id="qr-wrap"></div>
    <div class="gidl" id="gl"></div>
  </div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbzqNk2YEdEhwto3K84_w5O4Fpmb77oem29cpyN_4J-em8c9SRaDe9fvThIMM8kFO8g/exec';
var promo = null, sex = 'male';

function show(id) {
  ['ld','nf','fm','ok'].forEach(function(v) {
    document.getElementById(v).style.display = v === id ? '' : 'none';
  });
}

function sg(g) {
  sex = g;
  document.getElementById('gm').className = 'gb' + (g === 'male' ? ' on' : '');
  document.getElementById('gf').className = 'gb' + (g === 'female' ? ' on' : '');
}

function serr(m) {
  var b = document.getElementById('eb');
  b.textContent = m;
  b.style.display = 'block';
}

function apiFetch(params, cb) {
  var url = API + '?' + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) { cb(null, d); })
    .catch(function(e) { cb(e.message); });
}

function apiPost(data, cb) {
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(data)
  })
  .then(function(r) { return r.json(); })
  .then(function(d) { cb(null, d); })
  .catch(function(e) { cb(e.message); });
}

// ── 初期化: URLパラメータからプロモーター情報を取得 ──
(function() {
  var p    = new URLSearchParams(location.search);
  var slug = p.get('p') || '';
  var eid  = p.get('e') || '';
  if (!slug) { show('nf'); return; }
  apiFetch({ action: 'getPromoterBySlug', slug: slug, event_id: eid }, function(e, d) {
    if (e || !d || !d.ok) { show('nf'); return; }
    promo = d.promoter;
    document.getElementById('pn').textContent = d.promoter.name;
    show('fm');
  });
})();

// ── 登録処理 ──
function reg() {
  document.getElementById('eb').style.display = 'none';
  var name = document.getElementById('nm').value.trim();
  var mail = document.getElementById('em').value.trim();
  if (!name) { serr('お名前を入力してください'); return; }
  if (!mail) { serr('メールアドレスを入力してください'); return; }

  var btn = document.getElementById('sb');
  btn.disabled = true;
  btn.textContent = '送信中…';

  apiPost(
    {
      action:       'registerGuest',
      event_id:     promo.event_id,
      name:         name,
      email:        mail,
      gender:       sex,
      promoter_id:  promo.promoter_id
    },
    function(e, d) {
      if (e || !d || !d.ok) {
        serr((d && d.message) || '登録できませんでした: ' + (e || ''));
        btn.disabled = false;
        btn.textContent = '登録する';
        return;
      }

      var gid = d.guest_id;

      // ✅ 修正: Guest IDをテキスト表示
      document.getElementById('gl').textContent = gid;

      // ✅ 修正: QRCode.jsライブラリでcanvasにQRコードを描画
      var wrap = document.getElementById('qr-wrap');
      wrap.innerHTML = '';

      QRCode.toCanvas(
        gid,
        {
          width:  200,
          margin: 2,
          color:  { dark: '#000000', light: '#ffffff' }
        },
        function(err, canvas) {
          if (err) {
            // ライブラリ描画失敗時のフォールバック: テキスト表示
            wrap.innerHTML = '<div style="padding:12px;font-size:0.75rem;color:#000;background:#fff;word-break:break-all;">' + gid + '</div>';
            console.error('QR生成エラー:', err);
          } else {
            wrap.appendChild(canvas);
          }
        }
      );

      show('ok');
    }
  );
}
</script>
</body>
</html>
