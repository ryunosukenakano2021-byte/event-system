<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARTY TOKYO</title>
<style>
body { background: #080808; color: #F5F0E8; font-family: sans-serif; padding: 32px 24px; }
h2   { color: #C9A84C; margin-bottom: 24px; font-weight: 300; }
input { display: block; width: 100%; background: transparent; border: none;
        border-bottom: 1px solid #555; color: #fff; padding: 10px 0;
        font-size: 1rem; margin-bottom: 20px; outline: none; }
input::placeholder { color: #555; }
button { background: #C9A84C; border: none; padding: 14px 40px;
         color: #000; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 8px; }
#log  { margin-top: 24px; font-size: 0.75rem; color: #CF4444;
        white-space: pre-wrap; word-break: break-all; line-height: 1.8; }
#done { display: none; }
#qr-wrap { background: #fff; display: inline-block; padding: 12px; margin: 16px 0; }
</style>
</head>
<body>

<div id="loading"><h2>読み込み中…</h2></div>

<div id="invalid" style="display:none">
  <h2>招待リンクが無効です</h2>
</div>

<div id="form" style="display:none">
  <h2>事前来場登録</h2>
  <p id="pname" style="color:#C9A84C; margin-bottom:24px;"></p>
  <input id="nm" type="text"  placeholder="お名前">
  <input id="em" type="email" placeholder="メールアドレス">
  <button onclick="reg()">登録する</button>
</div>

<div id="done">
  <h2 style="color:#C9A84C;">登録完了</h2>
  <p id="gid" style="font-size:0.8rem; margin-bottom:12px; color:#888;"></p>
  <p style="font-size:0.85rem; margin-bottom:16px;">QRコードを当日ご提示ください</p>
  <div id="qr-wrap"></div>
</div>

<div id="log"></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbzqNk2YEdEhwto3K84_w5O4Fpmb77oem29cpyN_4J-em8c9SRaDe9fvThIMM8kFO8g/exec';
var promo = null;

function L(msg) {
  var el = document.getElementById('log');
  el.textContent += msg + '\n';
}

function hideAll() {
  ['loading','invalid','form','done'].forEach(function(id) {
    document.getElementById(id).style.display = 'none';
  });
}

// ── 初期化 ──
L('[INIT] 開始');
try {
  var params = new URLSearchParams(location.search);
  var slug = params.get('p') || '';
  var eid  = params.get('e') || '';
  L('[INIT] slug=' + slug + ' eid=' + eid);

  if (!slug) {
    hideAll();
    document.getElementById('invalid').style.display = 'block';
    L('[INIT] slugなし → 無効表示');
  } else {
    var url = API + '?action=getPromoterBySlug&slug=' + encodeURIComponent(slug) + '&event_id=' + encodeURIComponent(eid);
    L('[INIT] API呼び出し: ' + url.slice(0,80) + '...');

    fetch(url)
      .then(function(r) {
        L('[API] status=' + r.status);
        return r.json();
      })
      .then(function(d) {
        L('[API] response=' + JSON.stringify(d).slice(0,120));
        if (!d || !d.ok) {
          hideAll();
          document.getElementById('invalid').style.display = 'block';
          L('[API] ok=false → 無効表示');
          return;
        }
        promo = d.promoter;
        document.getElementById('pname').textContent = '招待者: ' + promo.name;
        hideAll();
        document.getElementById('form').style.display = 'block';
        L('[API] フォーム表示OK');
      })
      .catch(function(e) {
        L('[API] fetchエラー: ' + e.message);
        hideAll();
        document.getElementById('invalid').style.display = 'block';
      });
  }
} catch(e) {
  L('[INIT] 例外: ' + e.message);
}

// ── 登録 ──
function reg() {
  L('[REG] 開始');
  var name = document.getElementById('nm').value.trim();
  var mail = document.getElementById('em').value.trim();
  if (!name) { L('[REG] 名前が空'); return; }
  if (!mail) { L('[REG] メールが空'); return; }
  if (!promo) { L('[REG] promoがnull'); return; }

  var body = JSON.stringify({
    action:      'registerGuest',
    event_id:    promo.event_id,
    name:        name,
    email:       mail,
    gender:      'male',
    promoter_id: promo.promoter_id
  });
  L('[REG] 送信body: ' + body);

  fetch(API, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body:    body
  })
  .then(function(r) {
    L('[REG] status=' + r.status);
    return r.json();
  })
  .then(function(d) {
    L('[REG] response=' + JSON.stringify(d).slice(0,120));

    if (!d || !d.ok) {
      L('[REG] 失敗: ' + (d && d.message));
      return;
    }

    var gid = d.guest_id;
    L('[REG] guest_id=' + gid);

    // ── QRコード描画 (Canvas) ──
    L('[QR] 生成開始');
    try {
      var canvas = document.createElement('canvas');
      canvas.width  = 200;
      canvas.height = 200;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 200, 200);
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText('QR: ' + gid, 10, 100);
      var wrap = document.getElementById('qr-wrap');
      wrap.innerHTML = '';
      wrap.appendChild(canvas);
      L('[QR] Canvas描画OK');
    } catch(e) {
      L('[QR] Canvasエラー: ' + e.message);
    }

    document.getElementById('gid').textContent = 'ID: ' + gid;
    hideAll();
    document.getElementById('done').style.display = 'block';
    L('[REG] 完了画面表示OK');
  })
  .catch(function(e) {
    L('[REG] fetchエラー: ' + e.message);
  });
}
</script>
</body>
</html>
