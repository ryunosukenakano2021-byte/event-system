<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API診断</title>
<style>
body{background:#111;color:#eee;font-family:monospace;padding:20px;font-size:13px;}
button{background:#C9A84C;border:none;color:#000;padding:10px 20px;cursor:pointer;margin:4px;font-size:13px;font-weight:bold;}
pre{background:#000;padding:16px;white-space:pre-wrap;word-break:break-all;font-size:12px;margin-top:12px;border-left:3px solid #C9A84C;}
h3{color:#C9A84C;margin:20px 0 8px;}
</style>
</head>
<body>
<h2>🔧 API診断ツール</h2>

<h3>GETテスト</h3>
<button onclick="t1()">① イベント一覧</button>
<button onclick="t2()">② プロモーター取得</button>

<h3>POSTテスト（登録）</h3>
<button onclick="t3()">③ テスト登録 → guest_idが返るか確認</button>

<pre id="out">ボタンを押してください</pre>

<script>
var API='https://script.google.com/macros/s/AKfycbzqNk2YEdEhwto3K84_w5O4Fpmb77oem29cpyN_4J-em8c9SRaDe9fvThIMM8kFO8g/exec';

function log(d){document.getElementById('out').textContent=JSON.stringify(d,null,2);}

function t1(){
  log('通信中…');
  fetch(API+'?action=getEvents')
    .then(function(r){return r.json();})
    .then(log)
    .catch(function(e){log({error:e.message});});
}

function t2(){
  var slug=prompt('slug（例: P-MM70QCV7）');
  if(!slug)return;
  log('通信中…');
  fetch(API+'?action=getPromoterBySlug&slug='+encodeURIComponent(slug))
    .then(function(r){return r.json();})
    .then(log)
    .catch(function(e){log({error:e.message});});
}

function t3(){
  var eid=prompt('event_id（例: EV-MM70PGL2）');
  var pid=prompt('promoter_id（例: P-MM70QCV7）');
  if(!eid||!pid)return;
  log('POSTで登録中…');
  fetch(API,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'registerGuest',event_id:eid,name:'診断テスト',email:'debug@test.com',gender:'male',promoter_id:pid})
  })
  .then(function(r){
    log('HTTPステータス: '+r.status+'\nレスポンスを解析中…');
    return r.json();
  })
  .then(function(d){
    log(d);
    if(d.ok && d.guest_id){
      document.getElementById('out').textContent += '\n\n✅ guest_id取得成功: '+d.guest_id+'\n→ QRコードは正常に生成できます';
    } else {
      document.getElementById('out').textContent += '\n\n❌ guest_idが返ってきていません';
    }
  })
  .catch(function(e){log({error:e.message,detail:'POSTレスポンスが取得できませんでした'});});
}
</script>
</body>
</html>
