<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VelvetOS — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  :root{
    --gold:#C9A84C;--gold-light:#E8D08A;--gold-dim:#7a6230;
    --black:#080808;--dark:#111111;--dark2:#191919;--dark3:#222222;
    --white:#F5F0E8;--gray:#888880;--gray-light:#555550;
    --free:#9B8EC4;--paid:#4CAF82;--cash:#E8A838;--unpaid:#CF4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;}

  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}
  .bg-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 60% at 70% 50%,rgba(201,168,76,0.05) 0%,transparent 70%);}
  .login-box{position:relative;z-index:2;width:100%;max-width:400px;padding:56px 40px;border:1px solid rgba(201,168,76,0.15);background:rgba(17,17,17,0.8);}
  .login-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold);letter-spacing:0.3em;margin-bottom:8px;}
  .login-sub{font-size:0.58rem;letter-spacing:0.3em;color:var(--gray);text-transform:uppercase;margin-bottom:40px;}
  .form-label{display:block;font-size:0.58rem;letter-spacing:0.25em;color:var(--gray);text-transform:uppercase;margin-bottom:10px;}
  .form-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:12px 0;color:var(--white);font-family:'Montserrat',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;letter-spacing:0.05em;}
  .form-input:focus{border-bottom-color:var(--gold);}
  .form-input::placeholder{color:rgba(255,255,255,0.2);}
  .form-select{width:100%;background:var(--dark2);border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:12px 4px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:0.85rem;outline:none;cursor:pointer;margin-bottom:0;}
  .form-select option{background:var(--dark2);}
  .btn-login{width:100%;margin-top:24px;background:var(--gold);border:none;cursor:pointer;padding:16px;color:var(--black);font-family:'Montserrat',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;transition:all 0.3s;}
  .btn-login:hover{background:var(--gold-light);}
  .login-error{color:#CF4444;font-size:0.68rem;margin-top:12px;display:none;}

  /* NAV */
  #app{display:none;}
  #nav{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.2);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);letter-spacing:0.3em;}
  .nav-tabs{display:flex;}
  .nav-tab{background:none;border:none;cursor:pointer;color:var(--gray);font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;padding:0 18px;height:60px;border-bottom:2px solid transparent;transition:all 0.3s;}
  .nav-tab:hover{color:var(--white);}
  .nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .event-pill{font-size:0.6rem;letter-spacing:0.1em;color:var(--gold-dim);border:1px solid rgba(201,168,76,0.25);padding:4px 12px;}
  .btn-logout{background:none;border:none;cursor:pointer;font-size:0.6rem;letter-spacing:0.15em;color:var(--gray);font-family:'Montserrat',sans-serif;transition:color 0.2s;}
  .btn-logout:hover{color:var(--white);}

  /* PAGES */
  .page{display:none;padding:40px;}
  .page.active{display:block;}

  /* PAGE HEADERS */
  .page-eyebrow{font-size:0.55rem;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--white);margin-bottom:32px;}
  .page-title span{color:var(--gold);font-style:italic;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:rgba(255,255,255,0.06);margin-bottom:1px;}
  .stat-card{background:var(--dark);padding:22px 24px;position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity 0.3s;}
  .stat-card:hover::after{opacity:1;}
  .stat-label{font-size:0.5rem;letter-spacing:0.2em;color:var(--gray);text-transform:uppercase;margin-bottom:8px;}
  .stat-value{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;line-height:1;}
  .sv-gold{color:var(--gold);} .sv-free{color:var(--free);} .sv-paid{color:var(--paid);} .sv-cash{color:var(--cash);}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:280px;}
  .search-input{width:100%;background:var(--dark2);border:1px solid rgba(255,255,255,0.08);padding:9px 12px 9px 34px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:0.7rem;outline:none;transition:border-color 0.3s;}
  .search-input:focus{border-color:rgba(201,168,76,0.4);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:0.7rem;}
  .filter-select{background:var(--dark2);border:1px solid rgba(255,255,255,0.08);color:var(--gray);padding:9px 10px;font-family:'Montserrat',sans-serif;font-size:0.65rem;outline:none;cursor:pointer;}
  .btn-action{background:transparent;border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:9px 18px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;transition:all 0.3s;}
  .btn-action:hover{background:rgba(201,168,76,0.08);border-color:var(--gold);}
  .spacer{flex:1;}

  /* TABLE */
  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:1px solid rgba(201,168,76,0.2);}
  th{text-align:left;padding:10px 12px;font-size:0.5rem;font-weight:500;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;}
  tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.2s;}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  td{padding:12px;font-size:0.7rem;color:var(--white);}
  td.muted{color:var(--gray);font-size:0.65rem;}
  .badge{display:inline-block;padding:3px 9px;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;}
  .badge-arrived{background:rgba(76,175,130,0.1);color:var(--paid);border:1px solid rgba(76,175,130,0.3);}
  .badge-pending{background:rgba(255,255,255,0.04);color:var(--gray);border:1px solid rgba(255,255,255,0.1);}
  .pay-badge{display:inline-block;padding:3px 9px;font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;white-space:nowrap;}
  .pay-free{background:rgba(155,142,196,0.12);color:var(--free);border:1px solid rgba(155,142,196,0.3);}
  .pay-paid{background:rgba(76,175,130,0.1);color:var(--paid);border:1px solid rgba(76,175,130,0.3);}
  .pay-cash{background:rgba(232,168,56,0.12);color:var(--cash);border:1px solid rgba(232,168,56,0.3);}
  .pay-unpaid{background:rgba(207,68,68,0.1);color:var(--unpaid);border:1px solid rgba(207,68,68,0.3);}
  .btn-ci{background:none;border:1px solid rgba(76,175,130,0.3);color:var(--paid);padding:4px 12px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.1em;transition:all 0.3s;}
  .btn-ci:hover{background:rgba(76,175,130,0.1);}
  .btn-ci:disabled{opacity:0.3;cursor:default;border-color:transparent;color:var(--gray);}

  /* PROMOTER CARDS */
  .promoter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:rgba(255,255,255,0.06);margin-top:24px;}
  .promoter-card{background:var(--dark);padding:24px 28px;transition:background 0.3s;}
  .promoter-card:hover{background:var(--dark2);}
  .p-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--white);margin-bottom:12px;}
  .p-stats{display:flex;gap:20px;margin-bottom:12px;}
  .p-stat-val{font-size:1.4rem;font-family:'Cormorant Garamond',serif;color:var(--gold);}
  .p-stat-label{font-size:0.5rem;letter-spacing:0.18em;color:var(--gray);text-transform:uppercase;}
  .p-bar{height:2px;background:rgba(255,255,255,0.08);margin:10px 0;}
  .p-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 0.6s;}
  .p-meta{font-size:0.62rem;color:var(--gray);line-height:1.8;}
  .p-meta strong{color:var(--gold);font-weight:400;}
  .p-url{margin-top:12px;font-size:0.58rem;color:var(--gray-light);word-break:break-all;border-top:1px solid rgba(255,255,255,0.06);padding-top:10px;display:flex;align-items:center;gap:8px;}
  .copy-btn{background:none;border:none;color:var(--gold-dim);cursor:pointer;font-size:0.7rem;padding:2px 6px;transition:color 0.2s;flex-shrink:0;}
  .copy-btn:hover{color:var(--gold);}

  /* CHECKIN PAGE */
  .checkin-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:900px;}
  .checkin-panel{background:var(--dark);border:1px solid rgba(255,255,255,0.06);padding:32px;}
  .panel-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--white);margin-bottom:20px;}
  .panel-title em{color:var(--gold);font-style:italic;}
  .camera-wrap{width:100%;aspect-ratio:1;background:#000;overflow:hidden;display:none;position:relative;margin-bottom:12px;}
  .camera-wrap.active{display:block;}
  #qr-video{width:100%;height:100%;object-fit:cover;display:block;}
  .scan-reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55%;aspect-ratio:1;border:1px solid rgba(201,168,76,0.5);box-shadow:0 0 0 9999px rgba(0,0,0,0.4);}
  .scan-reticle::before,.scan-reticle::after,.scan-reticle span::before,.scan-reticle span::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--gold);border-style:solid;}
  .scan-reticle::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
  .scan-reticle::after{top:-1px;right:-1px;border-width:2px 2px 0 0;}
  .scan-reticle span::before{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}
  .scan-reticle span::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
  .scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:scanMove 2s linear infinite;}
  .cam-status{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:0.58rem;letter-spacing:0.18em;color:rgba(201,168,76,0.8);text-transform:uppercase;}
  @keyframes scanMove{0%{top:0}100%{top:100%}}

  .cam-controls{display:flex;gap:0;margin-bottom:12px;}
  .btn-cam{flex:1;background:var(--dark2);border:1px solid rgba(201,168,76,0.3);color:var(--gold);padding:12px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-cam:hover{background:rgba(201,168,76,0.08);}
  .btn-cam.active{background:rgba(201,168,76,0.12);border-color:var(--gold);}
  .btn-flip{width:44px;background:var(--dark2);border:1px solid rgba(255,255,255,0.08);border-left:none;color:var(--gray);cursor:pointer;font-size:0.9rem;transition:color 0.2s;display:none;}
  .btn-flip:hover{color:var(--white);}
  .divider-or{display:flex;align-items:center;gap:10px;margin:12px 0;}
  .divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
  .divider-or span{font-size:0.55rem;letter-spacing:0.18em;color:var(--gray);text-transform:uppercase;}
  .manual-input{width:100%;background:var(--dark2);border:1px solid rgba(255,255,255,0.1);padding:14px 16px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:0.85rem;letter-spacing:0.1em;outline:none;transition:border-color 0.3s;text-align:center;margin-bottom:10px;display:block;}
  .manual-input:focus{border-color:rgba(201,168,76,0.5);}
  .manual-input::placeholder{color:rgba(255,255,255,0.2);}
  .btn-process{width:100%;background:var(--gold);border:none;cursor:pointer;padding:16px;color:var(--black);font-family:'Montserrat',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;transition:all 0.3s;}
  .btn-process:hover{background:var(--gold-light);}

  /* RESULT CARD */
  .result-card{display:none;margin-top:16px;border:1px solid;padding:20px 20px 16px;position:relative;animation:fadeUp 0.3s ease both;}
  .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .rc-free{border-color:rgba(155,142,196,0.35);background:rgba(155,142,196,0.06);} .rc-free::before{background:var(--free);}
  .rc-paid{border-color:rgba(76,175,130,0.35);background:rgba(76,175,130,0.06);} .rc-paid::before{background:var(--paid);}
  .rc-cash{border-color:rgba(232,168,56,0.45);background:rgba(232,168,56,0.07);} .rc-cash::before{background:var(--cash);}
  .rc-unpaid{border-color:rgba(207,68,68,0.4);background:rgba(207,68,68,0.07);} .rc-unpaid::before{background:var(--unpaid);}
  .rc-dup{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06);} .rc-dup::before{background:var(--gold);}
  .rc-error{border-color:rgba(207,68,68,0.3);background:rgba(207,68,68,0.05);} .rc-error::before{background:var(--unpaid);}
  .rc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  .rc-status{font-size:0.52rem;letter-spacing:0.25em;text-transform:uppercase;font-weight:500;margin-bottom:4px;}
  .rc-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--white);line-height:1.1;}
  .rc-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
  .ai-free{background:rgba(155,142,196,0.15);border:1px solid rgba(155,142,196,0.4);}
  .ai-paid{background:rgba(76,175,130,0.15);border:1px solid rgba(76,175,130,0.4);}
  .ai-cash{background:rgba(232,168,56,0.15);border:1px solid rgba(232,168,56,0.4);}
  .ai-unpaid{background:rgba(207,68,68,0.15);border:1px solid rgba(207,68,68,0.4);}
  .ai-dup{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);}
  .ai-error{background:rgba(207,68,68,0.12);border:1px solid rgba(207,68,68,0.3);}
  .rc-divider{height:1px;background:rgba(255,255,255,0.07);margin:12px 0;}
  .rc-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .rc-meta-label{font-size:0.5rem;letter-spacing:0.18em;color:var(--gray);text-transform:uppercase;margin-bottom:2px;}
  .rc-meta-value{font-size:0.75rem;color:var(--white);}
  .rc-instr{margin-top:12px;padding:12px 14px;font-size:0.7rem;line-height:1.6;}
  .rc-instr.inst-cash{background:rgba(232,168,56,0.1);border:1px solid rgba(232,168,56,0.3);color:var(--cash);}
  .rc-instr.inst-unpaid{background:rgba(207,68,68,0.08);border:1px solid rgba(207,68,68,0.3);color:var(--unpaid);}
  .amount-big{font-family:'Cormorant Garamond',serif;font-size:2.4rem;line-height:1;}
  .amt-free{color:var(--free);font-size:1.2rem;letter-spacing:0.05em;}
  .amt-paid{color:var(--paid);}
  .amt-cash{color:var(--cash);}
  .btn-confirm-cash{width:100%;margin-top:10px;background:var(--cash);border:none;cursor:pointer;padding:14px;color:var(--black);font-family:'Montserrat',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;transition:all 0.3s;}
  .btn-confirm-cash:hover{background:#f0b840;}

  /* EVENTS PAGE */
  .event-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:rgba(255,255,255,0.06);margin-top:24px;}
  .event-card{background:var(--dark);padding:24px 28px;transition:background 0.3s;}
  .event-card:hover{background:var(--dark2);}
  .event-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--white);margin-bottom:4px;}
  .event-date{font-size:0.65rem;color:var(--gray);margin-bottom:12px;}
  .status-pill{display:inline-block;padding:3px 10px;font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:0;}
  .status-active{background:rgba(76,175,130,0.1);color:var(--paid);border:1px solid rgba(76,175,130,0.3);}
  .status-closed{background:rgba(255,255,255,0.04);color:var(--gray);border:1px solid rgba(255,255,255,0.1);}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--dark);border:1px solid rgba(201,168,76,0.2);width:100%;max-width:460px;padding:40px;animation:fadeUp 0.4s ease both;}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--white);margin-bottom:28px;}
  .modal-actions{display:flex;gap:10px;margin-top:28px;}
  .btn-cancel{flex:1;background:none;border:1px solid rgba(255,255,255,0.1);color:var(--gray);padding:13px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.58rem;letter-spacing:0.18em;transition:all 0.3s;}
  .btn-cancel:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}
  .btn-confirm{flex:1;background:var(--gold);border:none;cursor:pointer;padding:13px;color:var(--black);font-family:'Montserrat',sans-serif;font-size:0.58rem;font-weight:600;letter-spacing:0.18em;transition:all 0.3s;}
  .btn-confirm:hover{background:var(--gold-light);}
  .modal-select{width:100%;background:var(--dark2);border:none;border-bottom:1px solid rgba(255,255,255,0.12);color:var(--white);padding:12px 0;font-family:'Montserrat',sans-serif;font-size:0.85rem;outline:none;cursor:pointer;}
  .modal-select option{background:var(--dark2);}
  .modal-note{font-size:0.62rem;color:var(--gray);margin-top:8px;line-height:1.6;}

  .toast{position:fixed;bottom:28px;right:28px;z-index:500;background:var(--dark2);border:1px solid rgba(201,168,76,0.3);padding:12px 20px;font-size:0.68rem;color:var(--white);display:none;animation:fadeUp 0.4s ease both;}
  .toast.show{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:900px){.stats-row{grid-template-columns:repeat(3,1fr);}.checkin-layout{grid-template-columns:1fr;}.page{padding:20px;}#nav{padding:0 16px;}.nav-tab{padding:0 10px;font-size:0.55rem;}}
  @media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}.rc-meta{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="bg-glow"></div>
  <div class="login-box">
    <div class="login-logo">VelvetOS</div>
    <div class="login-sub">Admin Panel</div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">パスワード / Password</label>
      <input class="form-input" id="login-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">ログイン / Login</button>
    <div class="login-error" id="login-error">パスワードが違います</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="nav">
    <div class="nav-logo">VelvetOS</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('checkin')" id="tab-checkin">入場</button>

      <div class="stat-card"><div class="stat-label" style="color:var(--free)">無料招待</div><div class="stat-value sv-free" id="st-free">—</div></div>
      <div class="stat-card"><div class="stat-label" style="color:var(--paid)">事前支払済</div><div class="stat-value sv-paid" id="st-paid">—</div></div>

<div class="modal-overlay" id="modal-promoter">

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-title">イベントを追加</div>
    <div style="margin-bottom:20px">
      <label class="form-label">イベント名</label>
      <input class="form-input" id="me-name" placeholder="NIGHT VOL.2">
    </div>
    <div style="margin-bottom:20px">
      <label class="form-label">開催日</label>
      <input class="form-input" id="me-date" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-event')">キャンセル</button>
      <button class="btn-confirm" onclick="addEvent()">追加</button>
    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzqNk2YEdEhwto3K84_w5O4Fpmb77oem29cpyN_4J-em8c9SRaDe9fvThIMM8kFO8g/exec';

let allGuests = [], allPromoters = [], allEvents = [];
let currentEventId = '';
let cameraStream = null, scanLoop = null, facingMode = 'environment';
let lastScanned = '', lastScannedTime = 0;

// ─── API ───
async function apiGet(p)  { const r = await fetch(API+'?'+new URLSearchParams(p).toString()); return r.json(); }
async function apiPost(b) { const r = await fetch(API,{method:'POST',body:JSON.stringify(b)}); return r.json(); }

// ─── TOAST ───
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000); }

// ─── LOGIN ───
async function doLogin() {
  const pw = document.getElementById('login-pw').value.trim();
  const data = await apiGet({ action:'auth', role:'admin', password:pw });
  if (data.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadEvents();
    await loadPromoters();
    await loadGuests();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function logout() { location.reload(); }

// ─── TABS ───
function showTab(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id !== 'checkin') stopCamera();
}

// ─── EVENTS ───
async function loadEvents() {
  const data = await apiGet({ action:'getEvents' });
  if (!data.ok) return;
  allEvents = data.events;
  renderEventCards();
  // populate event selectors
  const active = allEvents.filter(e=>e.status==='active');
  if (active.length > 0) {
    currentEventId = active[0].event_id;
    document.getElementById('nav-event-label').textContent = active[0].name;
  }
  // modal selects
  ['mp-event'].forEach(selId=>{
    const sel = document.getElementById(selId); sel.innerHTML='';
    allEvents.forEach(ev=>{ const o=document.createElement('option'); o.value=ev.event_id; o.textContent=ev.name+' ('+ev.date+')'; sel.appendChild(o); });
  });
}

function renderEventCards() {
  const grid = document.getElementById('event-cards'); grid.innerHTML='';
  allEvents.forEach(ev=>{
    const card = document.createElement('div'); card.className='event-card';
    card.innerHTML=`
      <div class="event-name">${ev.name}</div>
      <div class="event-date">${ev.date}</div>
      <span class="status-pill ${ev.status==='active'?'status-active':'status-closed'}">${ev.status==='active'?'開催中':'終了'}</span>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-action" style="font-size:0.55rem;padding:6px 12px" onclick="setActiveEvent('${ev.event_id}','${ev.name}')">このイベントで作業</button>
        ${ev.status==='active'
          ? `<button class="btn-action" style="font-size:0.55rem;padding:6px 12px;border-color:rgba(207,68,68,0.4);color:#CF4444" onclick="closeEvent('${ev.event_id}')">終了にする</button>`
          : ''}
      </div>`;
    grid.appendChild(card);
  });
}

function setActiveEvent(id, name) {
  currentEventId = id;
  document.getElementById('nav-event-label').textContent = name;
  loadGuests(); loadPromoters();
  toast('✦ ' + name + ' を選択しました');
}

async function addEvent() {
  const name = document.getElementById('me-name').value.trim();
  const date = document.getElementById('me-date').value;
  if (!name||!date) { toast('イベント名と日付を入力してください'); return; }
  const data = await apiPost({ action:'addEvent', name, date });
  if (data.ok) { closeModal('modal-event'); await loadEvents(); toast('✦ イベントを追加しました'); }
  else toast('エラー: ' + data.message);
}

async function closeEvent(id) {
  if (!confirm('このイベントを終了にしますか？')) return;
  await apiPost({ action:'updateEventStatus', event_id:id, status:'closed' });
  await loadEvents(); toast('イベントを終了にしました');
}

// ─── GUESTS ───
async function loadGuests() {
  if (!currentEventId) return;
  const data = await apiGet({ action:'getGuests', event_id:currentEventId });
  if (!data.ok) return;
  allGuests = data.guests;
  updateStats();
  renderGuestTable();
  // promoter filter
  const sel = document.getElementById('g-filter-promo'), cur = sel.value;
  sel.innerHTML = '<option value="all">全プロモーター</option>';
  allPromoters.forEach(p=>{ const o=document.createElement('option'); o.value=p.promoter_id; o.textContent=p.name; sel.appendChild(o); });
  sel.value = cur;
}

function updateStats() {
  const t = allGuests.length;
  const a = allGuests.filter(g=>String(g.arrived).toUpperCase()==='TRUE').length;
  const fr= allGuests.filter(g=>g.pay_type==='free').length;
  const pp= allGuests.filter(g=>g.pay_type==='prepaid').length;
  const ca= allGuests.filter(g=>g.pay_type==='cash').length;
  const rev= allGuests.filter(g=>payOK(g)&&String(g.arrived).toUpperCase()==='TRUE').reduce((s,g)=>s+Number(g.amount),0);
  document.getElementById('st-total').textContent   = t;
  document.getElementById('st-arrived').textContent = a;
  document.getElementById('st-free').textContent    = fr;
  document.getElementById('st-paid').textContent    = pp;
  document.getElementById('st-cash').textContent    = ca;
  document.getElementById('st-rev').textContent     = '¥'+rev.toLocaleString();
}

function payOK(g){ return g.pay_type==='free'||g.pay_type==='prepaid'||(g.pay_type==='cash'&&String(g.pay_confirmed).toUpperCase()==='TRUE'); }
function payLabel(g){
  if(g.pay_type==='free')    return '無料招待';
  if(g.pay_type==='prepaid') return '事前支払済';
  if(g.pay_type==='cash'&&String(g.pay_confirmed).toUpperCase()!=='TRUE') return '当日払（未収）';
  if(g.pay_type==='cash')    return '当日払（収済）';
  return '未払い';
}
function payClass(g){
  if(g.pay_type==='free')    return 'pay-free';
  if(g.pay_type==='prepaid') return 'pay-paid';
  if(g.pay_type==='cash')    return 'pay-cash';
  return 'pay-unpaid';
}

function renderGuestTable() {
  const q   = document.getElementById('g-search').value.toLowerCase();
  const st  = document.getElementById('g-filter-status').value;
  const pay = document.getElementById('g-filter-pay').value;
  const pr  = document.getElementById('g-filter-promo').value;
  const filtered = allGuests.filter(g=>{
    const mQ  = g.guest_id.toLowerCase().includes(q)||g.name.toLowerCase().includes(q)||g.email.toLowerCase().includes(q);
    const arr = String(g.arrived).toUpperCase()==='TRUE';
    const mS  = st==='all'||(st==='arrived'&&arr)||(st==='pending'&&!arr);
    const mP  = pay==='all'||(pay==='free'&&g.pay_type==='free')||(pay==='prepaid'&&g.pay_type==='prepaid')||(pay==='cash'&&g.pay_type==='cash')||(pay==='unpaid'&&g.pay_type==='unpaid');
    const mPr = pr==='all'||g.promoter_id===pr;
    return mQ&&mS&&mP&&mPr;
  });
  const tbody = document.getElementById('guest-tbody'); tbody.innerHTML='';
  filtered.forEach(g=>{
    const promo = allPromoters.find(p=>p.promoter_id===g.promoter_id);
    const arr   = String(g.arrived).toUpperCase()==='TRUE';
    const amt   = g.pay_type==='free' ? '<span style="color:var(--gray)">—</span>' : '¥'+Number(g.amount).toLocaleString();
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td class="muted" style="font-family:'Cormorant Garamond',serif;color:var(--gold-dim)">${g.guest_id}</td>
      <td>${g.name}</td>
      <td class="muted">${promo?promo.name:'—'}</td>
      <td><span class="pay-badge ${payClass(g)}">${payLabel(g)}</span></td>
      <td style="font-family:'Cormorant Garamond',serif;font-size:0.95rem">${amt}</td>
      <td>${arr?'<span class="badge badge-arrived">来場済</span>':'<span class="badge badge-pending">未来場</span>'}</td>
      <td><button class="btn-ci" ${arr?'disabled':''} onclick="tableCheckIn('${g.guest_id}')">${arr?'済':'チェックイン'}</button></td>`;
    tbody.appendChild(tr);
  });
}

async function tableCheckIn(guestId) {
  const data = await apiPost({ action:'checkIn', guest_id:guestId });
  if (data.ok) { await loadGuests(); toast('✦ '+data.name+' さんが来場しました'); }
  else if (data.status==='cash_required') {
    if (confirm('当日払い（¥'+Number(data.amount).toLocaleString()+'）を受け取りましたか？\n'+data.name)) {
      const d2 = await apiPost({ action:'checkIn', guest_id:guestId, confirm_cash:true });
      if (d2.ok) { await loadGuests(); toast('✦ 現金受取済み — '+d2.name+' さん入場'); }
    }
  } else toast('⚠ '+data.message);
}

// ─── PROMOTERS ───
async function loadPromoters() {
  if (!currentEventId) return;
  const data = await apiGet({ action:'getPromoters', event_id:currentEventId });
  if (!data.ok) return;
  allPromoters = data.promoters;
  renderPromoterGrid();
}

function renderPromoterGrid() {
  const grid = document.getElementById('promoter-grid'); grid.innerHTML='';
  const maxA = Math.max(...allPromoters.map(p=>allGuests.filter(g=>g.promoter_id===p.promoter_id&&String(g.arrived).toUpperCase()==='TRUE').length),1);
  allPromoters.forEach(p=>{
    const invited = allGuests.filter(g=>g.promoter_id===p.promoter_id).length;
    const arrived = allGuests.filter(g=>g.promoter_id===p.promoter_id&&String(g.arrived).toUpperCase()==='TRUE').length;
    const pct     = invited ? Math.round(arrived/invited*100) : 0;
    const rev     = allGuests.filter(g=>g.promoter_id===p.promoter_id&&payOK(g)&&String(g.arrived).toUpperCase()==='TRUE').reduce((s,g)=>s+Number(g.amount),0);
    const barW    = Math.round(arrived/maxA*100);
    const regUrl  = location.origin+location.pathname.replace('admin.html','index.html')+'?p='+p.slug+'&e='+currentEventId;
    const promUrl = location.origin+location.pathname.replace('admin.html','promoter.html')+'?e='+currentEventId;
    const card = document.createElement('div'); card.className='promoter-card';
    card.innerHTML=`
      <div class="p-name">${p.name}</div>
      <div class="p-stats">
        <div><div class="p-stat-val">${invited}</div><div class="p-stat-label">招待</div></div>
        <div><div class="p-stat-val">${arrived}</div><div class="p-stat-label">来場</div></div>
        <div><div class="p-stat-val" style="color:var(--white)">${pct}%</div><div class="p-stat-label">来場率</div></div>
      </div>
      <div class="p-bar"><div class="p-bar-fill" style="width:${barW}%"></div></div>
      <div class="p-meta">
        来場収益: <strong>¥${rev.toLocaleString()}</strong>　
        支払い設定: <strong>${p.pay_type||'cash'}</strong>
      </div>
      <div class="p-url">
        <div>
          <div style="font-size:0.5rem;color:var(--gold-dim);margin-bottom:2px">📋 申し込みURL（招待客用）</div>
          <span style="opacity:0.6">${regUrl}</span>
        </div>
        <button class="copy-btn" onclick="copyText('${regUrl}',this)">📋</button>
      </div>
      <div class="p-url">
        <div>
          <div style="font-size:0.5rem;color:var(--gold-dim);margin-bottom:2px">📊 プロモーターダッシュボード</div>
          <span style="opacity:0.6">${promUrl}</span>
        </div>
        <button class="copy-btn" onclick="copyText('${promUrl}',this)">📋</button>
      </div>`;
    grid.appendChild(card);
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(()=>{ btn.textContent='✓'; setTimeout(()=>btn.textContent='📋',1500); toast('URLをコピーしました'); });
}

async function addPromoter() {
  const eventId  = document.getElementById('mp-event').value;
  const name     = document.getElementById('mp-name').value.trim();
  const password = document.getElementById('mp-password').value.trim();
  const payType  = document.getElementById('mp-paytype').value;
  const amount   = payType==='free' ? 0 : parseInt(document.getElementById('mp-amount').value)||0;
  if (!name||!password) { toast('名前とパスワードを入力してください'); return; }
  const data = await apiPost({ action:'addPromoter', event_id:eventId, name, password, pay_type:payType, amount });
  if (data.ok) {
    closeModal('modal-promoter');
    await loadPromoters();
    toast('✦ '+name+' を追加しました');
  } else toast('エラー: '+data.message);
}

function toggleAmountField() {
  document.getElementById('mp-amount-group').style.display = document.getElementById('mp-paytype').value==='free'?'none':'';
}

// ─── MODALS ───
function openAddPromoterModal() { document.getElementById('modal-promoter').classList.add('active'); }
function openAddEventModal()    { document.getElementById('modal-event').classList.add('active'); }
function closeModal(id)         { document.getElementById(id).classList.remove('active'); }

// ─── CHECKIN ───
const JSQR_CDNS=['https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js','https://unpkg.com/jsqr@1.4.0/dist/jsQR.js'];
function loadScript(url){return new Promise((res,rej)=>{if(window.jsQR){res();return;}const s=document.createElement('script');s.src=url;s.onload=res;s.onerror=rej;document.head.appendChild(s);})}
async function loadJsQR(){if(window.jsQR)return;for(const u of JSQR_CDNS){try{await loadScript(u);if(window.jsQR)return;}catch(e){}}throw new Error('jsQR load failed');}

async function toggleCamera(){ if(cameraStream){stopCamera();}else{await startCamera();} }
async function startCamera(){
  try{ await loadJsQR(); }catch(e){ toast('⚠ QRライブラリを読み込めませんでした'); return; }
  if(!navigator.mediaDevices){toast('⚠ カメラ非対応');return;}
  try{
    cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1280},height:{ideal:1280}}});
    document.getElementById('qr-video').srcObject=cameraStream;
    await document.getElementById('qr-video').play();
    document.getElementById('camera-wrap').classList.add('active');
    document.getElementById('btn-cam').classList.add('active');
    document.getElementById('btn-flip').style.display='';
    document.getElementById('cam-icon').textContent='⏹';
    document.getElementById('cam-label').textContent='カメラを停止';
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    scanLoop=setInterval(()=>{
      const v=document.getElementById('qr-video');
      if(v.readyState<2||v.videoWidth===0)return;
      canvas.width=v.videoWidth;canvas.height=v.videoHeight;
      ctx.drawImage(v,0,0);
      const d=ctx.getImageData(0,0,canvas.width,canvas.height);
      const c=window.jsQR(d.data,d.width,d.height,{inversionAttempts:'dontInvert'});
      if(c){
        const raw=c.data.trim().toUpperCase();
        const now=Date.now();
        if(raw===lastScanned&&now-lastScannedTime<3000)return;
        lastScanned=raw;lastScannedTime=now;
        document.getElementById('camera-wrap').style.outline='3px solid var(--gold)';
        setTimeout(()=>document.getElementById('camera-wrap').style.outline='',500);
        document.getElementById('ci-input').value=raw;
        processCheckin();
      }
    },250);
  }catch(err){
    cameraStream=null;
    toast(err.name==='NotAllowedError'?'⚠ カメラを許可してください':'⚠ カメラエラー: '+err.message);
  }
}
function stopCamera(){
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  if(scanLoop){clearInterval(scanLoop);scanLoop=null;}
  const v=document.getElementById('qr-video'); v.srcObject=null;
  document.getElementById('camera-wrap').classList.remove('active');
  document.getElementById('btn-cam').classList.remove('active');
  document.getElementById('btn-flip').style.display='none';
  document.getElementById('cam-icon').textContent='📷';
  document.getElementById('cam-label').textContent='カメラでスキャン';
}
async function flipCamera(){ facingMode=facingMode==='environment'?'user':'environment'; stopCamera(); await startCamera(); }

async function processCheckin(){
  const input=document.getElementById('ci-input').value.trim().toUpperCase();
  if(!input)return;
  const data=await apiPost({action:'checkIn',guest_id:input});
  showResult(data,input);
  if(data.ok){await loadGuests();}
}

function showResult(data,input){
  document.getElementById('result-placeholder').style.display='none';
  const card=document.getElementById('result-card');
  const status=document.getElementById('rc-status');
  const name=document.getElementById('rc-name');
  const icon=document.getElementById('rc-icon');
  const meta=document.getElementById('rc-meta');
  const extra=document.getElementById('rc-extra');
  card.className='result-card';
  status.className='rc-status';
  icon.className='rc-icon';
  extra.innerHTML='';

  if(data.status==='not_found'){
    card.classList.add('rc-error'); status.style.color='var(--unpaid)';
    status.textContent='⚠ 登録なし'; name.textContent=input;
    icon.classList.add('ai-error'); icon.textContent='✕';
    meta.innerHTML=`<div><div class="rc-meta-label">入力値</div><div class="rc-meta-value">${input}</div></div>`;
  } else if(data.status==='duplicate'){
    card.classList.add('rc-dup'); status.style.color='var(--gold)';
    status.textContent='⚠ 入場済み — 重複'; name.textContent=data.name||input;
    icon.classList.add('ai-dup'); icon.textContent='⟳';
    meta.innerHTML=`<div><div class="rc-meta-label">ステータス</div><div class="rc-meta-value">既に入場済みです</div></div>`;
  } else if(data.status==='cash_required'){
    card.classList.add('rc-cash'); status.style.color='var(--cash)';
    status.textContent='⚠ 当日払い — 料金を受け取ってください'; name.textContent=data.name;
    icon.classList.add('ai-cash'); icon.textContent='¥';
    meta.innerHTML=`<div style="grid-column:1/-1"><div class="rc-meta-label">受取金額</div><div class="rc-meta-value"><span class="amount-big amt-cash">¥${Number(data.amount).toLocaleString()}</span></div></div>`;
    extra.innerHTML=`
      <div class="rc-instr inst-cash"><strong>スタッフへ：</strong> ¥${Number(data.amount).toLocaleString()} を受け取った後、下のボタンを押してください。</div>
      <button class="btn-confirm-cash" onclick="confirmCash('${document.getElementById('ci-input').value.trim().toUpperCase()}')">💴 現金受取済み — 入場を許可する</button>`;
  } else if(data.ok){
    const pt=data.pay_type;
    if(pt==='free'){
      card.classList.add('rc-free'); status.style.color='var(--free)';
      status.textContent='✦ 無料招待 — 入場OK'; icon.classList.add('ai-free'); icon.textContent='🎟';
    } else {
      card.classList.add('rc-paid'); status.style.color='var(--paid)';
      status.textContent='✦ '+(pt==='prepaid'?'事前支払済み':'当日払い収済')+' — 入場OK'; icon.classList.add('ai-paid'); icon.textContent='✔';
    }
    name.textContent=data.name;
    const promo=allPromoters.find(p=>p.promoter_id===data.promoter_id);
    meta.innerHTML=`
      <div><div class="rc-meta-label">プロモーター</div><div class="rc-meta-value">${promo?promo.name:'—'}</div></div>
      <div><div class="rc-meta-label">金額</div><div class="rc-meta-value">${pt==='free'?'<span class="amount-big amt-free">無料</span>':'<span class="amount-big '+(pt==='prepaid'?'amt-paid':'amt-cash')+'">¥'+Number(data.amount).toLocaleString()+'</span>'}</div></div>`;
    document.getElementById('ci-input').value='';
  }
  card.style.display='block';
}

async function confirmCash(guestId){
  const data=await apiPost({action:'checkIn',guest_id:guestId,confirm_cash:true});
  showResult(data,guestId);
  if(data.ok){await loadGuests(); toast('✦ 現金受取済み — '+data.name+' さん入場');}
}
</script>
